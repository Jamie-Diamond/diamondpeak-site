<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Triathlon Race Time Predictor — Diamond Peak</title>
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f8f5ef;
    --card: #fff;
    --ink: #18160f;
    --ink2: #4a4535;
    --muted: #9a9080;
    --border: #ddd8cc;
    --green: #1d6840;
    --green-bg: #e6f4ec;
    --blue: #1a5276;
    --amber: #b87c20;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--ink); font-family: 'DM Sans', sans-serif; font-weight: 300; }

  .page { max-width: 820px; margin: 0 auto; padding: 36px 16px 72px; }
  @media(min-width:600px) { .page { padding: 56px 24px 80px; } }

  .back { color: var(--muted); text-decoration: none; font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 0.05em; }
  .back:hover { color: var(--ink); }

  .kicker {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
    margin-top: 20px;
  }
  h1 {
    font-family: 'Libre Baskerville', serif;
    font-size: clamp(26px, 5vw, 38px);
    font-weight: 700;
    line-height: 1.15;
    margin-bottom: 10px;
  }
  .intro {
    font-size: 14px;
    color: var(--ink2);
    line-height: 1.7;
    margin-bottom: 36px;
  }

  /* Preset buttons */
  .preset-row {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 24px;
  }
  .preset-btn {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.04em;
    padding: 7px 14px;
    border: 1px solid var(--border);
    border-radius: 999px;
    background: var(--card);
    color: var(--ink2);
    cursor: pointer;
    transition: all 0.15s;
  }
  .preset-btn:hover { border-color: var(--ink); color: var(--ink); }
  .preset-btn.active {
    background: var(--ink);
    color: #fff;
    border-color: var(--ink);
  }

  /* Panels */
  .tp-panel {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 20px;
    margin-bottom: 16px;
  }
  @media(min-width:520px) { .tp-panel { padding: 24px; } }
  .tp-panel-title {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 16px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }

  /* Fields */
  .tp-field { margin-bottom: 14px; }
  .tp-field:last-child { margin-bottom: 0; }
  .tp-field label {
    display: block;
    font-size: 11px;
    font-weight: 500;
    color: var(--ink2);
    margin-bottom: 5px;
    line-height: 1.3;
  }
  .tp-field .tp-hint {
    font-size: 10px;
    color: var(--muted);
    margin-top: 3px;
    line-height: 1.5;
  }

  /* Slider */
  .tp-slider-row { display: flex; align-items: center; gap: 10px; }
  .tp-slider-row input[type="range"] {
    flex: 1; height: 5px;
    -webkit-appearance: none; appearance: none;
    background: linear-gradient(to right, var(--green) 0%, var(--green) var(--fill,50%), var(--border) var(--fill,50%), var(--border) 100%);
    border-radius: 999px; outline: none;
  }
  .tp-slider-row input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none; width: 18px; height: 18px; border-radius: 50%;
    background: var(--green); cursor: pointer; box-shadow: 0 1px 4px rgba(0,0,0,0.15);
  }
  .tp-slider-row input[type="range"]::-moz-range-thumb {
    width: 18px; height: 18px; border-radius: 50%;
    background: var(--green); cursor: pointer; border: none;
  }
  .tp-slider-val {
    font-family: 'DM Mono', monospace;
    font-size: 13px; font-weight: 500;
    color: var(--green); min-width: 60px; text-align: right;
  }

  /* Headline output */
  .tp-headline {
    background: var(--ink);
    color: white;
    border-radius: 8px;
    padding: 24px;
    text-align: center;
    margin-bottom: 16px;
    position: relative;
    overflow: hidden;
  }
  .tp-headline::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 30% 0%, rgba(29,104,64,0.12), transparent 60%);
    pointer-events: none;
  }
  .tp-hl-context {
    font-size: 11px;
    color: rgba(255,255,255,0.45);
    margin-bottom: 6px;
    position: relative;
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  .tp-hl-number {
    font-family: 'DM Mono', monospace;
    font-size: clamp(32px, 7vw, 52px);
    font-weight: 500;
    line-height: 1;
    display: block;
    margin-bottom: 4px;
    position: relative;
    color: #a8e8c0;
  }
  .tp-hl-sub {
    font-size: 12px;
    color: rgba(255,255,255,0.4);
    position: relative;
  }

  /* Split times row */
  .tp-split-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 10px;
    margin-bottom: 16px;
  }
  @media(max-width:480px) { .tp-split-grid { grid-template-columns: 1fr; } }
  .tp-split-box {
    background: var(--ink);
    border-radius: 8px;
    padding: 14px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .tp-split-box::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 30% 0%, rgba(29,104,64,0.08), transparent 60%);
    pointer-events: none;
  }
  .tp-split-label {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.4);
    margin-bottom: 4px;
    position: relative;
  }
  .tp-split-time {
    font-family: 'DM Mono', monospace;
    font-size: 20px;
    font-weight: 500;
    color: #fff;
    position: relative;
  }
  .tp-split-dist {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    color: rgba(255,255,255,0.3);
    margin-top: 2px;
    position: relative;
  }

  /* Output rows */
  .tp-out-row {
    display: flex;
    justify-content: space-between;
    padding: 9px 0;
    font-size: 12px;
    color: var(--ink2);
    border-bottom: 1px solid #eee9df;
  }
  .tp-out-row:last-child { border-bottom: none; }
  .tp-out-val {
    font-family: 'DM Mono', monospace;
    font-weight: 500;
    font-size: 13px;
    color: var(--green);
  }

  /* Stacked bar */
  .tp-bar-container {
    margin-top: 8px;
  }
  .tp-bar-label-row {
    display: flex;
    margin-bottom: 6px;
    gap: 4px;
  }
  .tp-bar-label {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: var(--muted);
    text-align: center;
    overflow: hidden;
  }
  .tp-bar {
    display: flex;
    height: 32px;
    border-radius: 6px;
    overflow: hidden;
  }
  .tp-bar-seg {
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    font-weight: 500;
    color: #fff;
    transition: width 0.3s ease;
    min-width: 0;
  }
  .tp-bar-seg span {
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    padding: 0 4px;
  }
  .tp-bar-seg.swim { background: var(--blue); }
  .tp-bar-seg.t1 { background: #7a6e5a; }
  .tp-bar-seg.bike { background: var(--green); }
  .tp-bar-seg.t2 { background: #7a6e5a; }
  .tp-bar-seg.run { background: #b53a1e; }

  .tp-bar-legend {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    margin-top: 10px;
  }
  .tp-bar-legend-item {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 10px;
    color: var(--ink2);
    font-family: 'DM Mono', monospace;
  }
  .tp-bar-legend-dot {
    width: 8px;
    height: 8px;
    border-radius: 2px;
    flex-shrink: 0;
  }

  /* Grid layout for inputs + outputs */
  .tp-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  @media(max-width:640px) { .tp-grid { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<div class="page">

  <a href="../index.html" class="back">&larr; Back to tools</a>

  <div class="kicker">RACE PLANNING</div>
  <h1>Triathlon Race Time<br>Predictor</h1>
  <p class="intro">
    Estimate your triathlon finish time across any distance. Select a race preset or
    enter custom distances, dial in your swim, bike and run paces, and see a real-time
    breakdown of splits and proportions.
  </p>

  <div id="tp-root">
    <p style="text-align:center;padding:2rem;color:var(--muted);font-size:12px;">Loading predictor&hellip;</p>
  </div>

</div>

<script>
(function(){
  'use strict';

  /* ── Distance presets (metres / km) ──────── */

  var PRESETS = [
    { name: 'Super Sprint', swim: 400,  bike: 10,  run: 2.5  },
    { name: 'Sprint',       swim: 750,  bike: 20,  run: 5    },
    { name: 'Olympic',      swim: 1500, bike: 40,  run: 10   },
    { name: '70.3',         swim: 1900, bike: 90,  run: 21.1 },
    { name: 'Ironman',      swim: 3800, bike: 180, run: 42.2 },
  ];

  /* ── Helpers ─────────────────────────────── */

  function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

  function secsToHMS(totalSec) {
    totalSec = Math.round(totalSec);
    var h = Math.floor(totalSec / 3600);
    var m = Math.floor((totalSec % 3600) / 60);
    var s = totalSec % 60;
    return (h > 0 ? h + ':' : '') +
           (h > 0 ? String(m).padStart(2,'0') : m) + ':' +
           String(s).padStart(2,'0');
  }

  function secsToHMSFull(totalSec) {
    totalSec = Math.round(totalSec);
    var h = Math.floor(totalSec / 3600);
    var m = Math.floor((totalSec % 3600) / 60);
    var s = totalSec % 60;
    return String(h).padStart(2,'0') + ':' +
           String(m).padStart(2,'0') + ':' +
           String(s).padStart(2,'0');
  }

  function pct(part, total) {
    if (total <= 0) return 0;
    return (part / total * 100);
  }

  function sliderFill(val, min, max) {
    return ((val - min) / (max - min) * 100);
  }

  /* ── State ───────────────────────────────── */

  var state = {
    presetIdx: 2, // Olympic
    swimPace: 110,
    bikeSpeed: 30,
    runPace: 5.5,
    t1: 3,
    t2: 2
  };

  /* ── Compute ─────────────────────────────── */

  function compute() {
    var p = PRESETS[state.presetIdx];
    var swimSec = (p.swim / 100) * state.swimPace;
    var bikeSec = (p.bike / state.bikeSpeed) * 3600;
    var runSec  = p.run * state.runPace * 60;
    var t1Sec   = state.t1 * 60;
    var t2Sec   = state.t2 * 60;
    var total   = swimSec + t1Sec + bikeSec + t2Sec + runSec;
    return {
      preset: p,
      swimSec: swimSec,
      bikeSec: bikeSec,
      runSec: runSec,
      t1Sec: t1Sec,
      t2Sec: t2Sec,
      total: total
    };
  }

  /* ── Render ──────────────────────────────── */

  function render() {
    var c = compute();
    var root = document.getElementById('tp-root');

    // Preset buttons
    var presetsHTML = '<div class="preset-row">';
    for (var i = 0; i < PRESETS.length; i++) {
      presetsHTML += '<button class="preset-btn' + (i === state.presetIdx ? ' active' : '') +
        '" data-preset="' + i + '">' + PRESETS[i].name + '</button>';
    }
    presetsHTML += '</div>';

    // Slider helpers
    function sliderHTML(id, label, unit, min, max, step, value) {
      var fill = sliderFill(value, min, max);
      return '<div class="tp-field">' +
        '<label>' + label + '</label>' +
        '<div class="tp-slider-row">' +
        '<input type="range" id="' + id + '" min="' + min + '" max="' + max +
        '" step="' + step + '" value="' + value + '" style="--fill:' + fill + '%">' +
        '<span class="tp-slider-val">' + (step < 1 ? value.toFixed(1) : value) + ' ' + unit + '</span>' +
        '</div></div>';
    }

    // Inputs panel
    var inputsHTML = '<div class="tp-panel">' +
      '<div class="tp-panel-title">Pace &amp; Transitions</div>' +
      sliderHTML('swimPace', 'Swim pace', 'sec/100m', 60, 180, 1, state.swimPace) +
      sliderHTML('bikeSpeed', 'Bike speed', 'km/h', 15, 45, 0.5, state.bikeSpeed) +
      sliderHTML('runPace', 'Run pace', 'min/km', 3.0, 8.0, 0.1, state.runPace) +
      sliderHTML('t1', 'T1 (swim to bike)', 'min', 0, 10, 0.5, state.t1) +
      sliderHTML('t2', 'T2 (bike to run)', 'min', 0, 10, 0.5, state.t2) +
      '</div>';

    // Output: headline total
    var headlineHTML = '<div class="tp-headline">' +
      '<div class="tp-hl-context">Estimated Finish Time</div>' +
      '<span class="tp-hl-number">' + secsToHMSFull(c.total) + '</span>' +
      '<div class="tp-hl-sub">' + c.preset.name + ' &mdash; ' +
      c.preset.swim + 'm / ' + c.preset.bike + 'km / ' + c.preset.run + 'km</div>' +
      '</div>';

    // Split boxes
    var splitsHTML = '<div class="tp-split-grid">' +
      '<div class="tp-split-box">' +
        '<div class="tp-split-label">Swim</div>' +
        '<div class="tp-split-time">' + secsToHMS(c.swimSec) + '</div>' +
        '<div class="tp-split-dist">' + c.preset.swim + 'm</div>' +
      '</div>' +
      '<div class="tp-split-box">' +
        '<div class="tp-split-label">Bike</div>' +
        '<div class="tp-split-time">' + secsToHMS(c.bikeSec) + '</div>' +
        '<div class="tp-split-dist">' + c.preset.bike + ' km</div>' +
      '</div>' +
      '<div class="tp-split-box">' +
        '<div class="tp-split-label">Run</div>' +
        '<div class="tp-split-time">' + secsToHMS(c.runSec) + '</div>' +
        '<div class="tp-split-dist">' + c.preset.run + ' km</div>' +
      '</div>' +
      '</div>';

    // Detail rows
    var detailHTML = '<div class="tp-panel" style="margin-bottom:16px">' +
      '<div class="tp-panel-title">Split Detail</div>' +
      '<div class="tp-out-row"><span>Swim</span><span class="tp-out-val">' + secsToHMS(c.swimSec) + '</span></div>' +
      '<div class="tp-out-row"><span>T1</span><span class="tp-out-val">' + secsToHMS(c.t1Sec) + '</span></div>' +
      '<div class="tp-out-row"><span>Bike</span><span class="tp-out-val">' + secsToHMS(c.bikeSec) + '</span></div>' +
      '<div class="tp-out-row"><span>T2</span><span class="tp-out-val">' + secsToHMS(c.t2Sec) + '</span></div>' +
      '<div class="tp-out-row"><span>Run</span><span class="tp-out-val">' + secsToHMS(c.runSec) + '</span></div>' +
      '<div class="tp-out-row" style="border-top:2px solid var(--border);padding-top:12px;margin-top:4px;">' +
        '<span style="font-weight:500;">Total</span>' +
        '<span class="tp-out-val" style="font-size:15px;">' + secsToHMSFull(c.total) + '</span></div>' +
      '</div>';

    // Proportions bar
    var swimPct = pct(c.swimSec, c.total);
    var t1Pct   = pct(c.t1Sec, c.total);
    var bikePct = pct(c.bikeSec, c.total);
    var t2Pct   = pct(c.t2Sec, c.total);
    var runPct  = pct(c.runSec, c.total);

    function segLabel(name, p) {
      return p > 6 ? name + ' ' + p.toFixed(0) + '%' : (p > 3 ? p.toFixed(0) + '%' : '');
    }

    var barHTML = '<div class="tp-panel">' +
      '<div class="tp-panel-title">Time Breakdown</div>' +
      '<div class="tp-bar-container">' +
      '<div class="tp-bar">' +
      '<div class="tp-bar-seg swim" style="width:' + swimPct + '%"><span>' + segLabel('Swim', swimPct) + '</span></div>' +
      '<div class="tp-bar-seg t1" style="width:' + t1Pct + '%"><span>' + segLabel('T1', t1Pct) + '</span></div>' +
      '<div class="tp-bar-seg bike" style="width:' + bikePct + '%"><span>' + segLabel('Bike', bikePct) + '</span></div>' +
      '<div class="tp-bar-seg t2" style="width:' + t2Pct + '%"><span>' + segLabel('T2', t2Pct) + '</span></div>' +
      '<div class="tp-bar-seg run" style="width:' + runPct + '%"><span>' + segLabel('Run', runPct) + '</span></div>' +
      '</div>' +
      '<div class="tp-bar-legend">' +
      '<div class="tp-bar-legend-item"><div class="tp-bar-legend-dot" style="background:var(--blue)"></div>Swim ' + swimPct.toFixed(1) + '%</div>' +
      '<div class="tp-bar-legend-item"><div class="tp-bar-legend-dot" style="background:#7a6e5a"></div>T1 ' + t1Pct.toFixed(1) + '%</div>' +
      '<div class="tp-bar-legend-item"><div class="tp-bar-legend-dot" style="background:var(--green)"></div>Bike ' + bikePct.toFixed(1) + '%</div>' +
      '<div class="tp-bar-legend-item"><div class="tp-bar-legend-dot" style="background:#7a6e5a"></div>T2 ' + t2Pct.toFixed(1) + '%</div>' +
      '<div class="tp-bar-legend-item"><div class="tp-bar-legend-dot" style="background:#b53a1e"></div>Run ' + runPct.toFixed(1) + '%</div>' +
      '</div></div></div>';

    // Assemble
    root.innerHTML = presetsHTML +
      '<div class="tp-grid">' +
        '<div>' + inputsHTML + '</div>' +
        '<div>' + headlineHTML + splitsHTML + detailHTML + '</div>' +
      '</div>' +
      barHTML;

    // Bind events
    bindEvents();
  }

  function bindEvents() {
    // Preset buttons
    var btns = document.querySelectorAll('.preset-btn');
    for (var i = 0; i < btns.length; i++) {
      btns[i].addEventListener('click', function() {
        state.presetIdx = parseInt(this.getAttribute('data-preset'));
        render();
      });
    }

    // Sliders
    function bindSlider(id, key, parser) {
      var el = document.getElementById(id);
      if (!el) return;
      el.addEventListener('input', function() {
        state[key] = parser(this.value);
        render();
      });
    }

    bindSlider('swimPace', 'swimPace', function(v) { return parseInt(v); });
    bindSlider('bikeSpeed', 'bikeSpeed', function(v) { return parseFloat(v); });
    bindSlider('runPace', 'runPace', function(v) { return parseFloat(v); });
    bindSlider('t1', 't1', function(v) { return parseFloat(v); });
    bindSlider('t2', 't2', function(v) { return parseFloat(v); });
  }

  /* ── Init ────────────────────────────────── */
  render();

})();
</script>
</body>
</html>
