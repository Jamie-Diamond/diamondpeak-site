<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Random Number Generator — Diamond Peak</title>
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f8f5ef;
    --card: #fff;
    --ink: #18160f;
    --ink2: #4a4535;
    --muted: #9a9080;
    --border: #ddd8cc;
    --green: #1d6840;
    --blue: #1a5276;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--ink); font-family: 'DM Sans', sans-serif; font-weight: 300; }

  .page { max-width: 720px; margin: 0 auto; padding: 36px 16px 72px; }
  @media(min-width:600px) { .page { padding: 56px 24px 80px; } }

  .back { color: var(--muted); text-decoration: none; font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 0.05em; }
  .back:hover { color: var(--ink); }

  .kicker {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
    margin-top: 20px;
  }
  h1 {
    font-family: 'Libre Baskerville', serif;
    font-size: clamp(26px, 5vw, 38px);
    font-weight: 700;
    line-height: 1.15;
    margin-bottom: 10px;
  }
  .intro {
    font-size: 14px;
    color: var(--ink2);
    line-height: 1.7;
    margin-bottom: 36px;
  }

  /* Inputs */
  .inputs {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 20px;
    margin-bottom: 28px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }
  @media(min-width:520px) { .inputs { grid-template-columns: 1fr 1fr 1fr; padding: 24px; } }

  .field label {
    display: block;
    font-size: 11px;
    font-weight: 500;
    color: var(--ink2);
    margin-bottom: 6px;
    line-height: 1.3;
  }
  input[type="number"] {
    width: 100%;
    height: 48px;
    border: 1px solid var(--border);
    border-radius: 4px;
    background: white;
    color: var(--ink);
    font-family: 'DM Mono', monospace;
    font-size: 16px;
    padding: 0 12px;
    outline: none;
    transition: border-color 0.15s;
    -webkit-appearance: none;
    -moz-appearance: textfield;
  }
  input[type="number"]:focus { border-color: var(--ink); }
  input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }

  .field.span-2 { grid-column: span 2; }
  @media(min-width:520px) { .field.span-2 { grid-column: span 1; } }

  /* Options row */
  .options {
    display: flex;
    gap: 16px;
    grid-column: 1 / -1;
  }
  .option-label {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    font-weight: 500;
    color: var(--ink2);
    cursor: pointer;
    user-select: none;
  }
  .option-label input[type="checkbox"] {
    width: 15px;
    height: 15px;
    accent-color: var(--ink);
    cursor: pointer;
  }

  /* Generate button */
  .btn-generate {
    grid-column: 1 / -1;
    padding: 12px;
    background: var(--ink);
    color: white;
    border: none;
    border-radius: 6px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .btn-generate:hover { opacity: 0.85; }
  .btn-generate:active { transform: scale(0.99); }

  /* Result */
  .result {
    background: var(--ink);
    color: white;
    border-radius: 8px;
    padding: 28px 24px;
    margin-bottom: 20px;
    text-align: center;
    position: relative;
    overflow: hidden;
    display: none;
  }
  .result.show { display: block; }
  .result::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 30% 0%, rgba(56,189,248,0.08), transparent 60%);
    pointer-events: none;
  }
  .result-label {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.45);
    margin-bottom: 12px;
    position: relative;
  }
  .result-single {
    font-family: 'DM Mono', monospace;
    font-size: clamp(48px, 12vw, 80px);
    font-weight: 500;
    line-height: 1;
    color: #a8e8c0;
    position: relative;
    animation: fadeIn 0.2s ease-out;
  }
  .result-multi {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 8px;
    position: relative;
  }
  .num-chip {
    font-family: 'DM Mono', monospace;
    font-size: 16px;
    font-weight: 500;
    padding: 6px 14px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 6px;
    color: #a8e8c0;
    animation: fadeIn 0.2s ease-out;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .result-error {
    font-size: 14px;
    color: #f0a090;
    position: relative;
  }

  /* History */
  .history {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px 18px;
    display: none;
  }
  .history.show { display: block; }
  .history-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
  }
  .history-title {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .clear-btn {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    cursor: pointer;
    border: none;
    background: none;
    text-decoration: underline;
    text-underline-offset: 2px;
  }
  .clear-btn:hover { color: var(--ink); }
  .history-list {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .history-chip {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    padding: 4px 10px;
    background: #faf8f4;
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--ink2);
  }
</style>
</head>
<body>
<div class="page">

  <a href="index.html" class="back">&larr; Back to tools</a>

  <div class="kicker">Utility</div>
  <h1>Random Number<br>Generator</h1>
  <p class="intro">
    Generate random numbers within any range, with options for unique values and sorting.
  </p>

  <div class="inputs">
    <div class="field">
      <label>Min</label>
      <input type="number" id="min" value="1">
    </div>
    <div class="field">
      <label>Max</label>
      <input type="number" id="max" value="100">
    </div>
    <div class="field">
      <label>How many</label>
      <input type="number" id="count" value="1" min="1" max="100">
    </div>
    <div class="options">
      <label class="option-label">
        <input type="checkbox" id="unique"> No duplicates
      </label>
      <label class="option-label">
        <input type="checkbox" id="sorted"> Sort results
      </label>
    </div>
    <button class="btn-generate" onclick="generate()">Generate</button>
  </div>

  <!-- Result -->
  <div class="result" id="result">
    <div class="result-label">Result</div>
    <div id="result-display"></div>
  </div>

  <!-- History -->
  <div class="history" id="history-section">
    <div class="history-header">
      <span class="history-title">History</span>
      <button class="clear-btn" onclick="clearHistory()">Clear</button>
    </div>
    <div class="history-list" id="history-list"></div>
  </div>

</div>

<script>
const hist = [];

function generate() {
  const min = parseInt(document.getElementById('min').value);
  const max = parseInt(document.getElementById('max').value);
  const count = parseInt(document.getElementById('count').value);
  const unique = document.getElementById('unique').checked;
  const sorted = document.getElementById('sorted').checked;
  const resultEl = document.getElementById('result');
  const display = document.getElementById('result-display');

  if (isNaN(min) || isNaN(max) || isNaN(count)) {
    display.innerHTML = '<div class="result-error">Please fill in all fields.</div>';
    resultEl.classList.add('show');
    return;
  }
  if (min >= max) {
    display.innerHTML = '<div class="result-error">Min must be less than Max.</div>';
    resultEl.classList.add('show');
    return;
  }
  if (count < 1 || count > 100) {
    display.innerHTML = '<div class="result-error">Count must be 1 to 100.</div>';
    resultEl.classList.add('show');
    return;
  }
  if (unique && count > (max - min + 1)) {
    display.innerHTML = '<div class="result-error">Not enough unique numbers in range.</div>';
    resultEl.classList.add('show');
    return;
  }

  let numbers = [];
  if (unique) {
    const pool = Array.from({ length: max - min + 1 }, (_, i) => i + min);
    for (let i = pool.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [pool[i], pool[j]] = [pool[j], pool[i]];
    }
    numbers = pool.slice(0, count);
  } else {
    for (let i = 0; i < count; i++) {
      numbers.push(Math.floor(Math.random() * (max - min + 1)) + min);
    }
  }

  if (sorted) numbers.sort((a, b) => a - b);

  const label = count === 1 ? `${numbers[0]}` : `[${numbers.join(', ')}]`;
  hist.unshift(label);
  if (hist.length > 20) hist.pop();
  renderHistory();

  display.innerHTML = '';
  setTimeout(() => {
    if (count === 1) {
      display.innerHTML = `<div class="result-single">${numbers[0]}</div>`;
    } else {
      display.innerHTML = '<div class="result-multi">' +
        numbers.map(n => `<span class="num-chip">${n}</span>`).join('') +
        '</div>';
    }
  }, 10);

  resultEl.classList.add('show');
}

function renderHistory() {
  const section = document.getElementById('history-section');
  const list = document.getElementById('history-list');
  if (hist.length === 0) { section.classList.remove('show'); return; }
  section.classList.add('show');
  list.innerHTML = hist.map(h => `<span class="history-chip">${h}</span>`).join('');
}

function clearHistory() {
  hist.length = 0;
  renderHistory();
}

document.addEventListener('keydown', e => { if (e.key === 'Enter') generate(); });
</script>
</body>
</html>
