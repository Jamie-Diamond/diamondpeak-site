<!doctype html>
<html lang="en-GB">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Athlete B — ClaudeCoach</title>
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.0/dist/chart.umd.js"></script>
<style>
  :root{
    --bg:#f8f5ef;--panel:#ffffff;--ink:#18160f;--ink2:#4a4535;
    --muted:#9a9080;--line:#ddd8cc;--green:#1d6840;--blue:#1a5276;
    --warn:#c9871f;--bad:#b3261e;
  }
  *{box-sizing:border-box}
  body{margin:0;padding:32px 24px 64px;font-family:'DM Sans',sans-serif;font-weight:300;background:var(--bg);color:var(--ink);line-height:1.55}
  a{color:inherit;text-decoration:none}
  .wrap{max-width:1000px;margin:0 auto}

  a.back{display:inline-flex;align-items:center;gap:6px;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);margin-bottom:28px;transition:color .25s}
  a.back:hover{color:var(--green)}

  .top{display:flex;flex-wrap:wrap;gap:12px;align-items:flex-end;justify-content:space-between;margin-bottom:6px}
  h1{font-family:'Libre Baskerville',serif;font-size:28px;font-weight:700;letter-spacing:-0.02em;margin:0}
  .race-tag{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted)}
  .updated{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:0.08em;margin-bottom:20px}

  .grid{display:grid;gap:14px}
  .grid-4{grid-template-columns:repeat(4,1fr)}
  @media(max-width:800px){.grid-4{grid-template-columns:repeat(2,1fr)}}
  @media(max-width:520px){.grid-4{grid-template-columns:1fr}}

  .panel{background:rgba(255,255,255,0.85);border:1px solid var(--line);border-radius:10px;padding:20px}
  .panel-title{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:0.16em;text-transform:uppercase;color:var(--muted);border-bottom:1px solid var(--line);padding-bottom:8px;margin:0 0 14px}

  .stat{display:flex;flex-direction:column;gap:3px}
  .stat .v{font-family:'Libre Baskerville',serif;font-size:28px;font-weight:700;letter-spacing:-0.02em;line-height:1}
  .stat .l{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:0.12em}
  .stat .d{font-size:11px;color:var(--muted);margin-top:2px}
  .stat.good .v{color:var(--green)}
  .stat.warn .v{color:var(--warn)}
  .stat.bad  .v{color:var(--bad)}

  .pill{display:inline-block;padding:2px 9px;border-radius:4px;font-family:'DM Mono',monospace;font-size:9px;font-weight:500;letter-spacing:0.08em;text-transform:uppercase}
  .pill-base{background:#dde9f5;color:#1a5276}
  .pill-build{background:#ddeee3;color:#1d6840}
  .pill-specific{background:#faf1d7;color:#856212}
  .pill-peak{background:#f5dbd6;color:#7d2218}
  .pill-taper{background:#ede9f5;color:#4a3e7a}

  .chart-wrap{position:relative;height:180px}
  .null-state{font-size:12px;color:var(--muted);font-family:'DM Mono',monospace;text-align:center;padding:30px 0}

  .footer{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:0.1em;text-transform:uppercase;border-top:1px solid var(--line);padding-top:20px;margin-top:20px}
</style>
</head>
<body>
<div class="wrap">
  <a href="index.html" class="back">&larr; ClaudeCoach</a>

  <div class="top">
    <div>
      <h1>Athlete B</h1>
      <div class="race-tag" id="race-tag">Loading...</div>
    </div>
    <div style="text-align:right">
      <div id="phase-pill"></div>
      <div class="updated" id="updated-label"></div>
    </div>
  </div>

  <div class="grid grid-4" style="margin-bottom:14px">
    <div class="panel">
      <div class="stat">
        <span class="v" id="v-countdown">—</span>
        <span class="l">Days to race</span>
        <span class="d" id="d-race-date"></span>
      </div>
    </div>
    <div class="panel">
      <div class="stat" id="stat-ctl">
        <span class="v" id="v-ctl">—</span>
        <span class="l">CTL (fitness)</span>
        <span class="d">chronic training load</span>
      </div>
    </div>
    <div class="panel">
      <div class="stat" id="stat-atl">
        <span class="v" id="v-atl">—</span>
        <span class="l">ATL (fatigue)</span>
        <span class="d">acute training load</span>
      </div>
    </div>
    <div class="panel">
      <div class="stat" id="stat-tsb">
        <span class="v" id="v-tsb">—</span>
        <span class="l">TSB (form)</span>
        <span class="d">positive = fresh</span>
      </div>
    </div>
  </div>

  <div class="panel" style="margin-bottom:14px">
    <div class="panel-title">Fitness trend (CTL)</div>
    <div class="chart-wrap">
      <div class="null-state" id="ctl-null">Fitness history will appear once training data syncs</div>
      <canvas id="ctl-chart" style="display:none"></canvas>
    </div>
  </div>

  <div class="footer">&copy; 2026 Diamond Peak Consulting &mdash; private</div>
</div>
<script>
(function() {
  fetch('site-data.json?v=' + Date.now())
    .then(function(r){ return r.json(); })
    .then(function(d){
      var a = d.athletes && d.athletes.kathryn;
      if (!a) return;

      var raceDate = new Date(a.race_date);
      var today    = new Date(); today.setHours(0,0,0,0);
      var days     = Math.max(0, Math.round((raceDate - today) / 86400000));

      document.getElementById('v-countdown').textContent = days;
      document.getElementById('d-race-date').textContent =
        raceDate.toLocaleDateString('en-GB', {day:'numeric', month:'short', year:'numeric'});
      document.getElementById('race-tag').textContent =
        (a.race_name || '') + (a.race_date ? ' — ' + a.race_date : '');
      if (d.updated) document.getElementById('updated-label').textContent = 'Updated ' + d.updated;

      // Phase
      function phase(dOut) {
        if (dOut > 84)  return ['Build',    'pill-build'];
        if (dOut > 56)  return ['Specific', 'pill-specific'];
        if (dOut > 28)  return ['Peak',     'pill-peak'];
        return               ['Taper',    'pill-taper'];
      }
      var ph = phase(days);
      document.getElementById('phase-pill').innerHTML =
        '<span class="pill ' + ph[1] + '">' + ph[0] + '</span>';

      function fill(id, val, dec) {
        if (val === null || val === undefined) return;
        document.getElementById(id).textContent =
          typeof val === 'number' ? val.toFixed(dec || 0) : val;
      }
      fill('v-ctl', a.ctl, 1);
      fill('v-atl', a.atl, 1);

      var tsb    = a.tsb;
      var tsbEl  = document.getElementById('v-tsb');
      var statEl = document.getElementById('stat-tsb');
      if (tsb !== null && tsb !== undefined) {
        tsbEl.textContent = (tsb > 0 ? '+' : '') + tsb.toFixed(1);
        statEl.className  = 'stat ' + (tsb > 5 ? 'good' : tsb < -20 ? 'bad' : 'warn');
      }

      var hist = a.ctl_history || [];
      if (hist.length > 0) {
        document.getElementById('ctl-null').style.display = 'none';
        var canvas = document.getElementById('ctl-chart');
        canvas.style.display = 'block';
        new Chart(canvas, {
          type: 'line',
          data: {
            labels: hist.map(function(p){ return p[0]; }),
            datasets: [{
              data: hist.map(function(p){ return p[1]; }),
              borderColor: '#1a5276',
              backgroundColor: 'rgba(26,82,118,0.08)',
              fill: true, tension: 0.35, pointRadius: 0, borderWidth: 2
            }]
          },
          options: {
            responsive: true, maintainAspectRatio: false,
            plugins: { legend: { display: false }, tooltip: {
              callbacks: { label: function(ctx){ return 'CTL ' + ctx.parsed.y.toFixed(1); }}
            }},
            scales: {
              x: { type: 'category', ticks: { font: { family: 'DM Mono', size: 9 }, color: '#9a9080', maxTicksLimit: 6 }, grid: { display: false }},
              y: { ticks: { font: { family: 'DM Mono', size: 9 }, color: '#9a9080' }, grid: { color: 'rgba(0,0,0,0.05)' }}
            }
          }
        });
      }
    })
    .catch(function(e){ console.warn('site-data.json unavailable', e); });
})();
</script>
</body>
</html>
