<!doctype html>
<html lang="en-GB">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Athlete B — ClaudeCoach</title>
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root{--bg:#f8f5ef;--ink:#18160f;--muted:#9a9080;--line:#ddd8cc;--green:#1d6840}
  *{box-sizing:border-box}
  body{margin:0;padding:32px 24px 64px;font-family:'DM Sans',sans-serif;font-weight:300;background:var(--bg);color:var(--ink);line-height:1.55}
  a{color:inherit;text-decoration:none}
  .wrap{max-width:700px;margin:0 auto}
  a.back{display:inline-flex;align-items:center;gap:6px;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);margin-bottom:40px;transition:color .25s}
  a.back:hover{color:var(--green)}
  h1{font-family:'Libre Baskerville',serif;font-size:28px;font-weight:700;letter-spacing:-0.02em;margin:0 0 8px}
  .kicker{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:0.16em;text-transform:uppercase;color:var(--muted);margin-bottom:4px}
  .placeholder{background:rgba(255,255,255,0.85);border:1px solid var(--line);border-radius:10px;padding:40px;text-align:center;margin-top:32px}
  .placeholder p{color:var(--muted);font-size:14px;margin:8px 0 0}
  .icon{width:48px;height:48px;border-radius:12px;background:#dde9f5;display:inline-flex;align-items:center;justify-content:center;margin-bottom:16px}
  .icon svg{width:24px;height:24px;color:#1a5276}
  .footer{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:0.1em;text-transform:uppercase;border-top:1px solid var(--line);padding-top:20px;margin-top:40px}
</style>
</head>
<body>
<div class="wrap">
  <a href="index.html" class="back">&larr; ClaudeCoach</a>
  <div class="kicker">Athlete</div>
  <h1>Athlete B</h1>

  <div class="placeholder">
    <div class="icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
    </div>
    <p>Onboarding in progress.</p>
    <p>This page will populate once the athlete completes setup.</p>
  </div>

  <div class="footer">&copy; 2026 Diamond Peak Consulting &mdash; private</div>
</div>
</body>
</html>
